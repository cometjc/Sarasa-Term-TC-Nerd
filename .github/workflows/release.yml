name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/cometjc/sarasa-term-tc-nerd-ci:ci-20260506
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Use HTTPS for public submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Resolve Sarasa source assets
        id: sarasa
        run: |
          set -euo pipefail
          mkdir -p .cache/sarasa-source
          hinted_key="$(scripts/ops/resolve-sarasa-asset --flavor hinted --output .cache/sarasa-source/hinted.json --field cache_key)"
          unhinted_key="$(scripts/ops/resolve-sarasa-asset --flavor unhinted --output .cache/sarasa-source/unhinted.json --field cache_key)"
          echo "cache-key=sarasa-source-${hinted_key}-${unhinted_key}" >> "$GITHUB_OUTPUT"

      - name: Restore Sarasa source font cache
        uses: actions/cache@v4
        with:
          path: .cache/sarasa-source
          key: ${{ steps.sarasa.outputs.cache-key }}

      - name: Build hinted TC Nerd fonts
        run: |
          scripts/ops/build-release \
            --flavor hinted \
            --metadata .cache/sarasa-source/hinted.json \
            --release-version "$GITHUB_REF_NAME" \
            --jobs "$(nproc)"

      - name: Stage hinted release assets
        run: |
          scripts/ops/stage-release-assets --include-weights Regular,Bold

      - name: Build unhinted TC Nerd fonts
        run: |
          scripts/ops/build-release \
            --flavor unhinted \
            --metadata .cache/sarasa-source/unhinted.json \
            --output-suffix '-Unhinted' \
            --release-version "$GITHUB_REF_NAME" \
            --jobs "$(nproc)"

      - name: Stage unhinted release assets
        run: |
          scripts/ops/stage-release-assets --suffix '-Unhinted'

      - name: Verify release asset sizes
        run: |
          scripts/ops/verify-release-assets release-assets

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/SarasaTermTCNerd.ttf.tar.gz
            release-assets/SarasaTermTCNerd.ttc.tar.gz
            release-assets/SarasaTermTCNerd.ttf.7z
            release-assets/SarasaTermTCNerd.ttc.7z
            release-assets/SarasaTermTCNerd-Regular.ttf
            release-assets/SarasaTermTCNerd-Bold.ttf
            release-assets/SarasaTermTCNerd-Unhinted.ttf.tar.gz
            release-assets/SarasaTermTCNerd-Unhinted.ttc.tar.gz
            release-assets/SarasaTermTCNerd-Unhinted.ttf.7z
            release-assets/SarasaTermTCNerd-Unhinted.ttc.7z
            release-assets/SHA256SUMS
