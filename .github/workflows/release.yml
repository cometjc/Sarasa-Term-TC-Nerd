name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y aria2 curl fontforge jq p7zip-full python3-fontforge

      - name: Use HTTPS for public submodules
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Build hinted TC Nerd fonts
        run: |
          JOBS="$(nproc)" bash -xeu build-fonts.sh

      - name: Stage hinted release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp \
            sarasa-nerd/SarasaTermTCNerd.ttf.tar.gz \
            sarasa-nerd/SarasaTermTCNerd.ttc.tar.gz \
            sarasa-nerd/SarasaTermTCNerd.ttf.7z \
            sarasa-nerd/SarasaTermTCNerd.ttc.7z \
            release-assets/

      - name: Build unhinted TC Nerd fonts
        run: |
          SARASA_ASSET_PATTERN='SarasaTermTC-TTF-Unhinted-[0-9.]+\.7z' \
            OUTPUT_SUFFIX='-Unhinted' \
            JOBS="$(nproc)" \
            bash -xeu build-fonts.sh

      - name: Stage unhinted release assets
        run: |
          set -euo pipefail
          cp \
            sarasa-nerd/SarasaTermTCNerd-Unhinted.ttf.tar.gz \
            sarasa-nerd/SarasaTermTCNerd-Unhinted.ttc.tar.gz \
            sarasa-nerd/SarasaTermTCNerd-Unhinted.ttf.7z \
            sarasa-nerd/SarasaTermTCNerd-Unhinted.ttc.7z \
            release-assets/

      - name: Verify release asset sizes
        run: |
          set -euo pipefail
          min_bytes=$((10 * 1024 * 1024))
          for file in release-assets/SarasaTermTCNerd*.tar.gz release-assets/SarasaTermTCNerd*.7z; do
            size="$(stat -c '%s' "$file")"
            if (( size < min_bytes )); then
              echo "$file is unexpectedly small: $size bytes" >&2
              exit 1
            fi
          done
          sha256sum release-assets/* > release-assets/SHA256SUMS
          ls -lh release-assets

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/SarasaTermTCNerd.ttf.tar.gz
            release-assets/SarasaTermTCNerd.ttc.tar.gz
            release-assets/SarasaTermTCNerd.ttf.7z
            release-assets/SarasaTermTCNerd.ttc.7z
            release-assets/SarasaTermTCNerd-Unhinted.ttf.tar.gz
            release-assets/SarasaTermTCNerd-Unhinted.ttc.tar.gz
            release-assets/SarasaTermTCNerd-Unhinted.ttf.7z
            release-assets/SarasaTermTCNerd-Unhinted.ttc.7z
            release-assets/SHA256SUMS
